services:
  aedp-portal:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    container_name: aedp-portal
    restart: unless-stopped
    ports:
      - "7177:7177"
    environment:
      - NODE_ENV=production
