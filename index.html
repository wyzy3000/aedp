<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <script>(function () { var s = localStorage.getItem('theme'); var p = window.matchMedia('(prefers-color-scheme: dark)').matches; if (s === 'dark' || (!s && p) || s === null) { document.documentElement.classList.add('dark'); } })();</script>
  <style>
    html.dark body {
      background: #060e08 !important
    }

    html.dark aside,
    aside {
      background: #fff !important;
      border-color: #e7e5e4 !important
    }

    body {
      background: #060e08
    }
  </style>
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="
            default-src 'self';
            script-src  'self' 'unsafe-inline';
            style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
            font-src    'self' https://fonts.gstatic.com;
            img-src     'self' data: blob: https://*.supabase.co;
            connect-src 'self'
                        https://*.supabase.co
                        https://api.open-meteo.com
                        wss://*.supabase.co;
            frame-ancestors 'none';
            object-src  'none';
            base-uri    'self';
          " />
  <meta http-equiv="X-Frame-Options" content="DENY" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta name="description"
    content="Amboseli Data Point Portal – Biostisho. An ecosystem early warning and decision support interface for the Amboseli Basin, Kenya." />
  <meta name="keywords"
    content="Amboseli, ecosystem, early warning, pasture, drought, Kajiado, Kenya, NDVI, One Health" />
  <meta property="og:title" content="Amboseli Data Portal – Biostisho" />
  <meta property="og:description"
    content="Real-time ecosystem pulse for the Amboseli Basin: pasture, habitat, weather and community science." />
  <title>Amboseli Data Portal – Biostisho</title>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
