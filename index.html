<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <script src="/theme.js"></script>
  <style>
    html.dark body {
      background: #060e08 !important
    }

    html.dark aside,
    aside {
      background: #fff !important;
      border-color: #e7e5e4 !important
    }

    body {
      background: #060e08
    }

  <link rel="icon" type="image/png" href="/src/assets/aedp-logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="
            default-src 'self';

            style-src   'self' 'unsafe-inline' https://fonts.googleapis.com https://raw.githubusercontent.com https://cdnjs.cloudflare.com;
            font-src    'self' https://fonts.gstatic.com;
            img-src     'self' data: blob: https://*.supabase.co https://*.basemaps.cartocdn.com https://unpkg.com https://raw.githubusercontent.com https://cdnjs.cloudflare.com;

    content="Real-time ecosystem pulse for the Amboseli Basin: pasture, habitat, weather and community science." />
