name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          envs: VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY
          script: |
            cd /docker/aedp-portal
            
            # Pull latest changes from git
            git pull origin main
            
            # Securely inject environment variables into .env for runtime
            echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" > .env
            echo "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY" >> .env
            
            # Ensure a completely clean rebuild using the new vars passed explicitly as build args
            docker compose down
            docker rmi aedp-portal-aedp-portal || true
            docker compose build --no-cache --build-arg VITE_SUPABASE_URL="$VITE_SUPABASE_URL" --build-arg VITE_SUPABASE_ANON_KEY="$VITE_SUPABASE_ANON_KEY"
            docker compose up -d
